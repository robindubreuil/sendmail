services:
  gosendmail:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./config.yaml:/etc/gosendmail/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
